name: nutri_wise
description: Aplikasi pelacak nutrisi dan kalori harian - NutriWise
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  sqflite: ^2.4.2+1
  path: ^1.9.1
  http: ^1.6.0
  flutter_local_notifications: ^21.0.0
  crypto: ^3.0.7
  intl: ^0.20.2
  shared_preferences: ^2.5.5
  sqflite_common_ffi: ^2.4.0+3
  supabase_flutter: ^2.12.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  # Untuk font Manrope, download dari Google Fonts
  # atau gunakan paket google_fonts
  # Uncomment jika font sudah didownload:
  # fonts:
  #   - family: Manrope
  #     fonts:
  #       - asset: assets/fonts/Manrope-Regular.ttf
  #       - asset: assets/fonts/Manrope-Bold.ttf
  #         weight: 700
  #       - asset: assets/fonts/Manrope-ExtraBold.ttf
  #         weight: 800
  #       - asset: assets/fonts/Manrope-Black.ttf
  #         weight: 900
